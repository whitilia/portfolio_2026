<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Culture Event — Preview</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
      }
      body {
        font-family: system-ui, sans-serif;
        background: #faf5ff;
        color: #3b0764;
      }
      .hero {
        padding: clamp(2rem, 8vw, 4rem) 1rem;
        text-align: center;
        background: linear-gradient(180deg, #e9d5ff 0%, transparent 100%);
      }
      .hero h1 {
        font-size: clamp(1.5rem, 5vw, 2.5rem);
        margin-bottom: 0.5rem;
      }
      .tickets {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        max-width: 900px;
        margin: 0 auto;
        padding: 1rem;
      }
      @media (min-width: 768px) {
        .tickets {
          flex-direction: row;
        }
      }
      .ticket {
        flex: 1;
        background: #fff;
        border-radius: 1rem;
        padding: 1.25rem;
        box-shadow: 0 10px 30px rgba(91, 33, 182, 0.12);
        border: 1px solid #ede9fe;
      }
      .ticket h2 {
        font-size: 1rem;
        margin-bottom: 0.35rem;
      }
    </style>
  </head>
  <body>
    <header class="hero">
      <h1>문화 · 전시 · 티켓</h1>
      <p>Tablet 이상에서 티켓 카드가 가로로 배치됩니다.</p>
    </header>
    <section class="tickets">
      <article class="ticket">
        <h2>얼리버드</h2>
        <p>반응형 카드 데모</p>
      </article>
      <article class="ticket">
        <h2>일반</h2>
        <p>375px에서는 세로 스택</p>
      </article>
    </section>
  </body>
</html>

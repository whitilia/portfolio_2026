<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edu Platform — Preview</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
      }
      body {
        font-family: system-ui, sans-serif;
        color: #0f172a;
      }
      .layout {
        display: grid;
        grid-template-columns: 1fr;
        min-height: 100vh;
      }
      @media (min-width: 768px) {
        .layout {
          grid-template-columns: 220px 1fr;
        }
      }
      .side {
        background: #1e293b;
        color: #e2e8f0;
        padding: 1rem;
        font-size: 0.85rem;
      }
      @media (max-width: 767.98px) {
        .side {
          order: 2;
        }
      }
      .main {
        padding: clamp(1rem, 3vw, 2rem);
        background: #fff;
      }
      .main h1 {
        font-size: clamp(1.25rem, 3vw, 1.75rem);
        margin-bottom: 0.75rem;
      }
      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin-top: 1rem;
      }
      .chip {
        display: inline-block;
        padding: 0.35rem 0.65rem;
        background: #eff6ff;
        color: #0047ff;
        border-radius: 999px;
        font-size: 0.75rem;
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside class="side">사이드바 · 768px 이상에서 좌측 고정</aside>
      <main class="main">
        <h1>학습 대시보드</h1>
        <p>Mobile에서는 사이드바가 하단으로 이동합니다.</p>
        <div class="chips">
          <span class="chip">강의</span>
          <span class="chip">과제</span>
          <span class="chip">Q&A</span>
        </div>
      </main>
    </div>
  </body>
</html>
